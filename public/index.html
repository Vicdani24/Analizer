<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OVER 0.5 HT ANALYZER</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:40px;
    color:#38bdf8;
}

header p{
    color:#cbd5e1;
    margin-top:10px;
}

.topbar{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

button{
    background:#22c55e;
    border:none;
    padding:15px 25px;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#status{
    text-align:center;
    margin-bottom:25px;
    color:#facc15;
    font-size:18px;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    border:1px solid #334155;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.league{
    color:#38bdf8;
    margin-bottom:10px;
    font-size:14px;
}

.match{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.percent{
    font-size:38px;
    font-weight:bold;
    margin-bottom:10px;
}

.green{
    color:#22c55e;
}

.yellow{
    color:#facc15;
}

.red{
    color:#ef4444;
}

.bar{
    width:100%;
    height:22px;
    background:#334155;
    border-radius:30px;
    overflow:hidden;
    margin-top:10px;
}

.bar-fill{
    height:100%;
    border-radius:30px;
    text-align:center;
    line-height:22px;
    font-size:13px;
    font-weight:bold;
    color:black;
}

.bar-green{
    background:#22c55e;
}

.bar-yellow{
    background:#facc15;
}

.bar-red{
    background:#ef4444;
}

.stats{
    margin-top:20px;
}

.stats p{
    margin:6px 0;
    color:#cbd5e1;
}

.tag{
    display:inline-block;
    margin-top:15px;
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.tag-green{
    background:#14532d;
    color:#4ade80;
}

.tag-yellow{
    background:#713f12;
    color:#facc15;
}

.tag-red{
    background:#7f1d1d;
    color:#f87171;
}

footer{
    text-align:center;
    margin-top:50px;
    color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<header>
    <h1>OVER 0.5 HT ANALYZER</h1>
    <p>Analisador profissional de gols no primeiro tempo</p>
</header>

<div class="topbar">
    <button onclick="analyzeGames()">
        ANALISAR JOGOS DE HOJE
    </button>
</div>

<div id="status">
    Clique para analisar os jogos.
</div>

<div class="games" id="games"></div>

<footer>
    Sistema de análise HT
</footer>

</div>

<script>

/*
======================================================
VERSÃO TOTALMENTE FUNCIONAL
SEM API
SEM NODEJS
SEM ERRO
======================================================

Esta versão:
- funciona apenas copiando e colando
- gera análises automáticas simuladas
- cria jogos automaticamente
- layout profissional
- ranking HT

Depois você pode integrar APIs reais.

======================================================
*/

const leagues = [

    "Premier League",
    "Brasileirão",
    "Bundesliga",
    "La Liga",
    "Serie A",
    "Ligue 1",
    "Champions League",
    "Eredivisie"

];

const teams = [

    "Manchester City",
    "Liverpool",
    "Arsenal",
    "Flamengo",
    "Palmeiras",
    "Barcelona",
    "Real Madrid",
    "Bayern",
    "Dortmund",
    "PSG",
    "Juventus",
    "Inter",
    "Milan",
    "Tottenham",
    "Chelsea",
    "Napoli",
    "Roma",
    "Benfica"

];

function random(min,max){

    return Math.floor(
        Math.random() * (max-min+1)
    ) + min;

}

function getRandomTeam(){

    return teams[
        random(0, teams.length - 1)
    ];

}

function getRandomLeague(){

    return leagues[
        random(0, leagues.length - 1)
    ];

}

function createGame(){

    let home = getRandomTeam();
    let away = getRandomTeam();

    while(home === away){

        away = getRandomTeam();

    }

    const probability = random(55,92);

    const homeHT = random(55,95);
    const awayConcede = random(50,90);
    const avgGoals = (
        Math.random() * 2 + 1
    ).toFixed(1);

    return {

        league:getRandomLeague(),
        home,
        away,
        probability,
        homeHT,
        awayConcede,
        avgGoals

    };

}

function analyzeGames(){

    const gamesDiv =
        document.getElementById("games");

    const status =
        document.getElementById("status");

    gamesDiv.innerHTML = "";

    status.innerHTML =
        "Analisando jogos do dia...";

    setTimeout(()=>{

        const games = [];

        for(let i=0;i<15;i++){

            games.push(createGame());

        }

        games.sort(
            (a,b)=>
            b.probability - a.probability
        );

        status.innerHTML =
            `${games.length} jogos analisados`;

        games.forEach(game=>{

            let color = "red";
            let barColor = "bar-red";
            let tag = "ARRISCADO";
            let tagClass = "tag-red";

            if(game.probability >= 78){

                color = "green";
                barColor = "bar-green";
                tag = "EXCELENTE";
                tagClass = "tag-green";

            }
            else if(game.probability >= 65){

                color = "yellow";
                barColor = "bar-yellow";
                tag = "BOA";
                tagClass = "tag-yellow";

            }

            gamesDiv.innerHTML += `

            <div class="card">

                <div class="league">
                    ${game.league}
                </div>

                <div class="match">
                    ${game.home} x ${game.away}
                </div>

                <div class="percent ${color}">
                    ${game.probability}%
                </div>

                <div>
                    Probabilidade Over 0.5 HT
                </div>

                <div class="bar">

                    <div
                        class="bar-fill ${barColor}"
                        style="
                            width:${game.probability}%
                        "
                    >
                        ${game.probability}%
                    </div>

                </div>

                <div class="stats">

                    <p>
                        🔥 Time casa marca HT:
                        ${game.homeHT}%
                    </p>

                    <p>
                        ⚠️ Visitante sofre HT:
                        ${game.awayConcede}%
                    </p>

                    <p>
                        ⚽ Média de gols:
                        ${game.avgGoals}
                    </p>

                </div>

                <div class="tag ${tagClass}">
                    ${tag}
                </div>

            </div>

            `;

        });

    },1500);

}

</script>

</body>
</html>
